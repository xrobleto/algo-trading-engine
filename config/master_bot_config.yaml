# =============================================================================
# TRADING UNIVERSE
# =============================================================================
# Core universe: Always scanned, high-quality blue-chip stocks
universe:
  # High-volume liquid stocks (VWAP scalping)
  - AAPL
  - MSFT
  - NVDA
  - TSLA
  - AMD

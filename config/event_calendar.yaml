# =============================================================================
# Event Calendar - Macro Events That Affect Position Sizing
# =============================================================================
# The trend bot reduces exposure before high-impact events.
# Update this file quarterly with upcoming FOMC, CPI, Jobs, etc.
#
# Risk levels:
#   high:   20% exposure reduction, 1 day lead time (FOMC, CPI, Jobs)
#   medium: 10% exposure reduction, 0 day lead time (GDP, retail sales)
#   low:     5% exposure reduction, 0 day lead time (minor reports)

event_risk:
  multipliers:
    high: 0.80
    medium: 0.90
    low: 0.95
    none: 1.00
  lead_days:
    high: 1
    medium: 0
    low: 0

